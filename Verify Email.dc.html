<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
<script src="./ds-base.js"></script>
<script src="./app-state.js"></script>
<style>
  .otp-box::placeholder { color: var(--gray-300); }
  .otp-box:focus { outline: none; border-color: var(--brand-500); box-shadow: var(--ring-brand); color: var(--brand-600); }
  .otp-box.filled { border-color: var(--brand-500); color: var(--brand-600); }
  .vbtn:disabled { background: var(--bg-secondary); color: var(--fg-quaternary); box-shadow: none; cursor: not-allowed; }
  .vbtn:not(:disabled) { background: var(--bg-brand-solid); color: #fff; box-shadow: var(--shadow-btn-primary); cursor: pointer; }
  .vbtn:not(:disabled):hover { background: var(--bg-brand-solid-hover); }
  .resend-link:hover { color: var(--brand-700); }
</style>
</helmet>
<div style="min-height:100vh;background:#FBFDFC url(assets/topo-bg.webp) center top / cover no-repeat;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;padding:48px 24px;font-family:var(--font-body);color:var(--fg-primary);box-sizing:border-box;">

  <div style="width:100%;max-width:548px;background:#fff;border:1px solid var(--border-secondary);border-radius:20px;box-shadow:var(--shadow-lg);padding:48px 56px 40px;box-sizing:border-box;text-align:center;">

    <div style="display:flex;justify-content:center;margin-bottom:20px;">
      <svg width="56" height="56" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
        <mask id="vm_mask" style="mask-type:alpha" maskUnits="userSpaceOnUse" x="0" y="0" width="56" height="56"><rect width="56" height="56" fill="url(#vm_grad)"></rect></mask>
        <g mask="url(#vm_mask)"><circle cx="28" cy="28" r="27.5" fill="#ECFDF3" stroke="#ABEFC6"></circle></g>
        <rect x="10" y="10" width="36" height="36" rx="18" fill="#079455"></rect>
        <path d="M19.6667 23.8334L26.4708 28.5962C27.0218 28.9819 27.2973 29.1748 27.5969 29.2495C27.8616 29.3154 28.1384 29.3154 28.4031 29.2495C28.7028 29.1748 28.9783 28.9819 29.5293 28.5962L36.3334 23.8334M23.6667 34.6667H32.3334C33.7335 34.6667 34.4335 34.6667 34.9683 34.3942C35.4387 34.1545 35.8212 33.7721 36.0609 33.3017C36.3334 32.7669 36.3334 32.0668 36.3334 30.6667V25.3334C36.3334 23.9332 36.3334 23.2332 36.0609 22.6984C35.8212 22.228 35.4387 21.8455 34.9683 21.6059C34.4335 21.3334 33.7335 21.3334 32.3334 21.3334H23.6667C22.2666 21.3334 21.5665 21.3334 21.0317 21.6059C20.5613 21.8455 20.1789 22.228 19.9392 22.6984C19.6667 23.2332 19.6667 23.9332 19.6667 25.3334V30.6667C19.6667 32.0668 19.6667 32.7669 19.9392 33.3017C20.1789 33.7721 20.5613 34.1545 21.0317 34.3942C21.5665 34.6667 22.2666 34.6667 23.6667 34.6667Z" stroke="white" stroke-width="1.67" stroke-linecap="round" stroke-linejoin="round"></path>
        <defs><linearGradient id="vm_grad" x1="28" y1="0" x2="28" y2="56" gradientUnits="userSpaceOnUse"><stop></stop><stop offset="1" stop-opacity="0"></stop></linearGradient></defs>
      </svg>
    </div>

    <h1 style="font-family:var(--font-display);font-size:30px;line-height:38px;font-weight:800;letter-spacing:-0.02em;margin:0 0 12px;color:var(--fg-primary);">Verify your email</h1>
    <p style="font-size:16px;line-height:24px;color:var(--fg-tertiary);margin:0 auto 28px;max-width:380px;">We've sent a 6-digit code to {{ email }}. Enter the code to verify your email</p>

    <div style="display:flex;justify-content:center;gap:12px;margin-bottom:14px;" ref="{{ otpWrapRef }}">
      <input class="otp-box" inputmode="numeric" maxlength="1" placeholder="0" onInput="{{ onOtpInput }}" onKeyDown="{{ onOtpKey }}" onPaste="{{ onOtpPaste }}" style="width:56px;height:56px;text-align:center;font-family:var(--font-display);font-size:28px;font-weight:700;color:var(--fg-primary);background:#fff;border:1px solid var(--border-primary);border-radius:12px;transition:border-color 120ms ease,box-shadow 120ms ease,color 120ms ease;padding:0;box-sizing:border-box;" />
      <input class="otp-box" inputmode="numeric" maxlength="1" placeholder="0" onInput="{{ onOtpInput }}" onKeyDown="{{ onOtpKey }}" onPaste="{{ onOtpPaste }}" style="width:56px;height:56px;text-align:center;font-family:var(--font-display);font-size:28px;font-weight:700;color:var(--fg-primary);background:#fff;border:1px solid var(--border-primary);border-radius:12px;transition:border-color 120ms ease,box-shadow 120ms ease,color 120ms ease;padding:0;box-sizing:border-box;" />
      <input class="otp-box" inputmode="numeric" maxlength="1" placeholder="0" onInput="{{ onOtpInput }}" onKeyDown="{{ onOtpKey }}" onPaste="{{ onOtpPaste }}" style="width:56px;height:56px;text-align:center;font-family:var(--font-display);font-size:28px;font-weight:700;color:var(--fg-primary);background:#fff;border:1px solid var(--border-primary);border-radius:12px;transition:border-color 120ms ease,box-shadow 120ms ease,color 120ms ease;padding:0;box-sizing:border-box;" />
      <input class="otp-box" inputmode="numeric" maxlength="1" placeholder="0" onInput="{{ onOtpInput }}" onKeyDown="{{ onOtpKey }}" onPaste="{{ onOtpPaste }}" style="width:56px;height:56px;text-align:center;font-family:var(--font-display);font-size:28px;font-weight:700;color:var(--fg-primary);background:#fff;border:1px solid var(--border-primary);border-radius:12px;transition:border-color 120ms ease,box-shadow 120ms ease,color 120ms ease;padding:0;box-sizing:border-box;" />
      <input class="otp-box" inputmode="numeric" maxlength="1" placeholder="0" onInput="{{ onOtpInput }}" onKeyDown="{{ onOtpKey }}" onPaste="{{ onOtpPaste }}" style="width:56px;height:56px;text-align:center;font-family:var(--font-display);font-size:28px;font-weight:700;color:var(--fg-primary);background:#fff;border:1px solid var(--border-primary);border-radius:12px;transition:border-color 120ms ease,box-shadow 120ms ease,color 120ms ease;padding:0;box-sizing:border-box;" />
      <input class="otp-box" inputmode="numeric" maxlength="1" placeholder="0" onInput="{{ onOtpInput }}" onKeyDown="{{ onOtpKey }}" onPaste="{{ onOtpPaste }}" style="width:56px;height:56px;text-align:center;font-family:var(--font-display);font-size:28px;font-weight:700;color:var(--fg-primary);background:#fff;border:1px solid var(--border-primary);border-radius:12px;transition:border-color 120ms ease,box-shadow 120ms ease,color 120ms ease;padding:0;box-sizing:border-box;" />
    </div>

    <p style="font-size:14px;color:var(--fg-tertiary);margin:0 0 28px;">Didn't get a code? <a href="#" class="resend-link" onClick="{{ onResend }}" style="color:var(--fg-secondary);font-weight:500;text-decoration:underline;text-underline-offset:2px;transition:color 120ms ease;">Click to resend</a>.<span style="color:var(--brand-600);font-weight:600;">{{ resendMsg }}</span></p>

    <div style="display:flex;justify-content:center;">
      <button class="vbtn" disabled="{{ notReady }}" onClick="{{ onVerify }}" style="display:inline-flex;align-items:center;justify-content:center;gap:8px;width:340px;max-width:100%;padding:14px 24px;font-family:var(--font-body);font-weight:600;font-size:16px;line-height:24px;border:none;border-radius:var(--radius-full);transition:background 120ms ease;">
        Verify &amp; continue
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </button>
    </div>

    <div style="display:flex;justify-content:center;margin-top:36px;">
      <img src="assets/dexwin-logo-full.png" alt="DexwinPay" style="height:28px;" />
    </div>
  </div>

  <a href="Sign Up.dc.html" style="display:inline-flex;align-items:center;gap:8px;font-size:15px;color:var(--brand-700);font-weight:700;text-decoration:none;">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Back to previous page
  </a>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { count: 0, resendMsg: '', email: '' };
  otpWrapRef = React.createRef();

  loadEmail() {
    if (!window.AppState || !window.AppState.getAccount) return false;
    this.setState({ email: window.AppState.getAccount().email || '' });
    return true;
  }

  boxes() {
    return this.otpWrapRef.current
      ? Array.from(this.otpWrapRef.current.querySelectorAll('.otp-box'))
      : [];
  }

  componentDidMount() {
    const b = this.boxes();
    if (b[0]) b[0].focus();
    if (!this.loadEmail()) { let n = 0; const poll = () => { if (this.loadEmail() || n++ > 20) return; setTimeout(poll, 30); }; poll(); }
  }

  recount() {
    const filled = this.boxes().filter(el => el.value).length;
    this.setState({ count: filled });
  }

  renderVals() {
    const setFilled = (el) => {
      if (el.value) el.classList.add('filled'); else el.classList.remove('filled');
    };
    return {
      otpWrapRef: this.otpWrapRef,
      email: this.state.email || 'your email',
      notReady: this.state.count < 6,
      resendMsg: this.state.resendMsg,
      onOtpInput: (e) => {
        const el = e.target;
        el.value = el.value.replace(/[^0-9]/g, '').slice(0, 1);
        setFilled(el);
        if (el.value) {
          const boxes = this.boxes();
          const i = boxes.indexOf(el);
          if (i > -1 && i < boxes.length - 1) boxes[i + 1].focus();
        }
        this.recount();
      },
      onOtpKey: (e) => {
        if (e.key === 'Backspace' && !e.target.value) {
          const boxes = this.boxes();
          const i = boxes.indexOf(e.target);
          if (i > 0) boxes[i - 1].focus();
        }
      },
      onOtpPaste: (e) => {
        e.preventDefault();
        const digits = (e.clipboardData.getData('text') || '').replace(/[^0-9]/g, '').slice(0, 6);
        const boxes = this.boxes();
        boxes.forEach((el, i) => { el.value = digits[i] || ''; setFilled(el); });
        const next = Math.min(digits.length, boxes.length - 1);
        if (boxes[next]) boxes[next].focus();
        this.recount();
      },
      onResend: (e) => {
        e.preventDefault();
        this.setState({ resendMsg: '  Code resent ✓' });
        setTimeout(() => this.setState({ resendMsg: '' }), 3000);
      },
      onVerify: () => {
        if (this.state.count >= 6) window.location.href = 'Account Activated.dc.html';
      },
    };
  }
}
</script>
</body>
</html>

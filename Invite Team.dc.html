<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
<script src="./ds-base.js"></script>
<script src="./app-state.js"></script>
<style>
  * { scrollbar-width: thin; scrollbar-color: #D5D7DA transparent; }
  *::-webkit-scrollbar { width: 10px; height: 10px; }
  *::-webkit-scrollbar-track { background: transparent; }
  *::-webkit-scrollbar-thumb { background: #D5D7DA; border-radius: 999px; border: 3px solid transparent; background-clip: padding-box; }
  *::-webkit-scrollbar-thumb:hover { background: #C0C3C9; background-clip: padding-box; border: 3px solid transparent; }
  *::-webkit-scrollbar-button { display: none; width: 0; height: 0; }
  *::-webkit-scrollbar-corner { background: transparent; }
</style>
</helmet>
<div style="{{ rootStyle }}">

  <sc-if value="{{ notEmbedded }}" hint-placeholder-val="{{ true }}">
  <header style="position:sticky;top:0;z-index:30;display:flex;align-items:center;height:72px;padding:0 48px;background:var(--bg-primary);border-bottom:1px solid var(--border-secondary);flex-shrink:0;">
    <img src="assets/dexwin-logo-full.png" alt="DexwinPay" style="height:28px;">
  </header>
  </sc-if>

  <main style="flex:1;padding:{{ mainPad }};box-sizing:border-box;">
    <div style="max-width: 720px; margin: 0 auto; width: 100%">
      <h1 style="font-family:var(--font-display);font-size:32px;line-height:40px;font-weight:800;letter-spacing:-0.02em;margin:0 0 8px;color:var(--fg-primary);">Invite your team</h1>
      <p style="font-size:16px;line-height:24px;color:var(--fg-tertiary);margin:0 0 36px;">Send invite to co-workers that help manage employees and payrolls</p>

      <div style="background:var(--bg-primary);border:1px solid var(--border-secondary);border-radius:16px;box-shadow:var(--shadow-xs);padding:8px 24px;">
        <sc-for list="{{ members }}" as="m" hint-placeholder-count="1">
          <sc-if value="{{ m.notFirst }}" hint-placeholder-val="{{ false }}">
            <div style="height:1px;background:var(--border-secondary);margin:0 -24px;"></div>
          </sc-if>
          <div onClick="{{ m.onOpen }}" style="display:flex;align-items:center;justify-content:space-between;gap:12px 16px;flex-wrap:wrap;padding:20px 0;cursor:pointer;">
            <div style="display:flex;align-items:center;gap:14px;min-width:0;flex:1 1 200px;">
              <x-import component-from-global-scope="DexwinPayDesignSystem_848e17.Avatar" initials="{{ m.initials }}" size="md" hint-size="40px,40px"></x-import>
              <div style="min-width:0;">
                <div style="font-size:16px;font-weight:700;color:var(--fg-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ m.name }}</div>
                <div style="font-size:14px;color:var(--fg-tertiary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ m.email }}</div>
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:12px;flex-shrink:0;">
              <span style="display:inline-flex;align-items:center;padding:5px 14px;border-radius:var(--radius-full);font-size:14px;font-weight:600;background:{{ m.badgeBg }};color:{{ m.badgeColor }};">{{ m.badge }}</span>
<div style="width:32px;flex-shrink:0;display:flex;align-items:center;justify-content:center;">
                <sc-if value="{{ m.isInvited }}" hint-placeholder-val="{{ false }}">
                  <span role="button" aria-label="Remove" onClick="{{ m.onDelete }}" style="display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;cursor:pointer;color:var(--error-500);transition:background 120ms ease;" style-hover="background:var(--error-50);">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" x2="10" y1="11" y2="17"></line><line x1="14" x2="14" y1="11" y2="17"></line></svg>
                  </span>
                </sc-if>
              </div>
            </div>
          </div>
        </sc-for>
      </div>

      <button onClick="{{ openModal }}" style="width: 100%; margin-top: 24px; display: flex; align-items: center; justify-content: center; gap: 12px; padding: 26px 24px; border: 1px dashed #02aa69; border-radius: 16px; cursor: pointer; font-family: var(--font-body); transition: background 120ms ease; background-color: #ffffff" style-hover="background:var(--brand-50);">
        <span style="display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:var(--radius-full);background:var(--brand-50);color:var(--brand-600);">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="height: 16px; width: 16px"><path d="M12 5v14M5 12h14"></path></svg>
        </span>
        <span style="font-size: 14px; font-weight: 700; color: var(--brand-700)">Invite a team member</span>
      </button>

      <sc-if value="{{ embedded }}" hint-placeholder-val="{{ false }}">
        <a href="Dashboard Page.dc.html" style="width:100%;box-sizing:border-box;margin-top:24px;display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 28px;font-family:var(--font-body);font-weight:700;font-size:16px;color:#fff;background:var(--bg-brand-solid);border-radius:var(--radius-full);box-shadow:var(--shadow-btn-primary);text-decoration:none;transition:background 120ms ease;" style-hover="background:var(--bg-brand-solid-hover);">Go to dashboard</a>
      </sc-if>
    </div>
  </main>

  <sc-if value="{{ notEmbedded }}" hint-placeholder-val="{{ true }}">
  <footer style="position:sticky;bottom:0;z-index:30;display:flex;align-items:center;justify-content:center;height:72px;padding:0 48px;border-top:1px solid var(--border-secondary);background:var(--bg-secondary);flex-shrink:0;">
    <div style="display:flex;align-items:center;justify-content:flex-end;gap:16px;width:100%;max-width:720px;margin:0 auto;">
    <a href="Dashboard Page.dc.html" style="display:inline-flex;align-items:center;justify-content:center;min-width:260px;padding:14px 28px;font-family:var(--font-body);font-weight:700;font-size:16px;color:#fff;background:var(--bg-brand-solid);border-radius:var(--radius-full);box-shadow:var(--shadow-btn-primary);text-decoration:none;transition:background 120ms ease;" style-hover="background:var(--bg-brand-solid-hover);">Go to Dashboard</a>
    </div>
  </footer>
  </sc-if>

  <sc-if value="{{ modalOpen }}" hint-placeholder-val="{{ false }}">
    <div onClick="{{ closeModal }}" style="position:fixed;inset:0;z-index:50;background:rgba(10,13,18,0.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:32px 24px;box-sizing:border-box;">
      <div onClick="{{ stop }}" style="width:100%;max-width:760px;max-height:calc(88vh / var(--dxp-zoom, 1));background:var(--bg-primary);border-radius:20px;box-shadow:var(--shadow-2xl);display:flex;flex-direction:column;overflow:hidden;">

        <div style="display:flex;align-items:flex-start;gap:16px;padding:24px 28px;border-bottom:1px solid var(--border-secondary);flex-shrink:0;">
          <div style="flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border:1px solid var(--border-secondary);border-radius:12px;box-shadow:var(--shadow-xs);color:var(--fg-secondary);">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 21a8 8 0 0 1 13.292-6"></path><circle cx="10" cy="8" r="5"></circle><path d="M19 16v6"></path><path d="M22 19h-6"></path></svg>
          </div>
          <div style="flex:1;">
            <h2 style="font-size:20px;line-height:28px;font-weight:700;margin:0 0 2px;color:var(--fg-primary);">{{ modalTitle }}</h2>
            <p style="font-size:15px;line-height:22px;color:var(--fg-tertiary);margin:0;">{{ modalDesc }}</p>
          </div>
          <span role="button" aria-label="Close" onClick="{{ closeModal }}" style="flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;cursor:pointer;color:var(--fg-quaternary);transition:background 120ms ease;" style-hover="background:var(--bg-tertiary);">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"></path></svg>
          </span>
        </div>

        <div style="flex:1;overflow-y:auto;padding:28px;">
          
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;">
            <x-import component-from-global-scope="DexwinPayDesignSystem_848e17.Input" label="First Name" required="{{ true }}" disabled="{{ inputsDisabled }}" value="{{ fFirst }}" on-change="{{ onFirst }}" error="{{ eFirst }}" placeholder="e.g. “Kojo”" size="lg" hint-size="100%,76px"></x-import>
            <x-import component-from-global-scope="DexwinPayDesignSystem_848e17.Input" label="Last Name" required="{{ true }}" disabled="{{ inputsDisabled }}" value="{{ fLast }}" on-change="{{ onLast }}" error="{{ eLast }}" placeholder="e.g. “Nkrumah”" size="lg" hint-size="100%,76px"></x-import>
            <x-import component-from-global-scope="DexwinPayDesignSystem_848e17.Input" label="Email" type="email" required="{{ true }}" disabled="{{ inputsDisabled }}" value="{{ fEmail }}" on-change="{{ onEmail }}" error="{{ eEmail }}" placeholder="e.g. “kojo@mycompany.com”" size="lg" hint-size="100%,76px"></x-import>
            <x-import component-from-global-scope="DexwinPayDesignSystem_848e17.Input" label="Phone Number" type="tel" disabled="{{ inputsDisabled }}" value="{{ fPhone }}" on-change="{{ onPhone }}" placeholder="e.g. “+233 20 123 4567”" size="lg" hint-size="100%,76px"></x-import>
          </div>

          <h3 style="font-size:17px;font-weight:700;margin:32px 0 8px;color:var(--fg-primary);">What can this team member access?</h3>
          <div>
            <sc-for list="{{ permsList }}" as="p" hint-placeholder-count="6">
              <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:24px;padding:14px 0;border-bottom:{{ p.border }};">
                <div style="min-width:0;">
                  <div style="font-size:16px;font-weight:600;color:var(--fg-secondary);">{{ p.title }}</div>
                  <div style="font-size:14px;line-height:20px;color:var(--fg-tertiary);margin-top:2px;">{{ p.desc }}</div>
                </div>
                <div style="flex-shrink:0;padding-top:2px;">
                  <x-import component-from-global-scope="DexwinPayDesignSystem_848e17.Toggle" checked="{{ p.on }}" disabled="{{ p.disabled }}" on-change="{{ p.onToggle }}" hint-size="44px,24px"></x-import>
                </div>
              </div>
            </sc-for>
          </div>
        </div>

        <sc-if value="{{ isInviteView }}" hint-placeholder-val="{{ true }}">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;padding:20px 28px;border-top:1px solid var(--border-secondary);flex-shrink:0;">
            <button onClick="{{ closeModal }}" style="display:inline-flex;align-items:center;justify-content:center;padding:14px 24px;font-family:var(--font-body);font-weight:700;font-size:16px;color:var(--fg-secondary);background:var(--bg-primary);border:1px solid var(--border-primary);border-radius:var(--radius-full);box-shadow:var(--shadow-xs);cursor:pointer;transition:background 120ms ease;" style-hover="background:var(--bg-tertiary);">Cancel</button>
            <button onClick="{{ sendInvite }}" style="display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:14px 24px;font-family:var(--font-body);font-weight:700;font-size:16px;color:#fff;background:var(--bg-brand-solid);border:none;border-radius:var(--radius-full);box-shadow:var(--shadow-btn-primary);cursor:pointer;transition:background 120ms ease;" style-hover="background:var(--bg-brand-solid-hover);">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"></path><path d="M22 2 11 13"></path></svg>
              Send Invite
            </button>
          </div>
        </sc-if>
        <sc-if value="{{ isOwnerView }}" hint-placeholder-val="{{ false }}">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;padding:20px 28px;border-top:1px solid var(--border-secondary);flex-shrink:0;">
            <div></div>
            <button onClick="{{ closeModal }}" style="display:inline-flex;align-items:center;justify-content:center;padding:14px 24px;font-family:var(--font-body);font-weight:700;font-size:16px;color:#fff;background:var(--bg-brand-solid);border:none;border-radius:var(--radius-full);box-shadow:var(--shadow-btn-primary);cursor:pointer;transition:background 120ms ease;" style-hover="background:var(--bg-brand-solid-hover);">Done</button>
          </div>
        </sc-if>

      </div>
    </div>
  </sc-if>

</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:920},&quot;embedded&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;}}">
const PERMS = [
  { key: 'fullAccess', title: 'Full Access - Admin', desc: 'Has access to all features and can manage other team members.' },
  { key: 'manageEmployees', title: 'Manage employees', desc: 'Add, update, and manage employee records and profiles.' },
  { key: 'roleManagement', title: 'Role Management', desc: 'Create and manage roles and team member permissions.' },
  { key: 'runPayroll', title: 'Run Payroll', desc: 'Process and manage employee payroll and compensation.' },
  { key: 'financeFullAccess', title: 'Finance Full Access', desc: 'Full access to financial data, reports, and transactions.' },
  { key: 'companyProfile', title: 'Company Profile Access', desc: 'View and manage company profile and organizational settings.' },
];

function initials(first, last) {
  const a = (first || '').trim();
  const b = (last || '').trim();
  return ((a[0] || '') + (b[0] || '')).toUpperCase() || '?';
}

class Component extends DCLogic {
  state = {
    modalOpen: false,
    editIndex: null,
    members: [],
    form: { firstName: '', lastName: '', email: '', phone: '' },
    perms: {},
    errors: {},
    owner: { firstName: '', lastName: '', email: '' },
  };

  componentDidMount() {
    const load = () => {
      if (!window.AppState) return false;
      const a = window.AppState.getAccount();
      let members = [];
      try { const v = localStorage.getItem('dxp_team'); members = v ? JSON.parse(v) : []; } catch (e) {}
      this.setState({ owner: { firstName: a.firstName || '', lastName: a.lastName || '', email: a.email || '' }, members: Array.isArray(members) ? members : [] });
      return true;
    };
    if (!load()) { let n = 0; const poll = () => { if (load() || n++ > 20) return; setTimeout(poll, 30); }; poll(); }
  }

  ownerNameVal() {
    const o = this.state.owner;
    const n = ((o.firstName || '') + ' ' + (o.lastName || '')).trim();
    return n || 'Account owner';
  }
  ownerEmailVal() { return this.state.owner.email || ''; }

  freshPerms() {
    const p = {};
    for (const def of PERMS) p[def.key] = false;
    p.fullAccess = false;
    return p;
  }

  openModal = () => {
    this.setState({
      modalOpen: true,
      editIndex: null,
      form: { firstName: '', lastName: '', email: '', phone: '' },
      perms: this.freshPerms(),
      errors: {},
    });
  };

  openOwner = () => {
    const ownerName = this.ownerNameVal();
    const parts = ownerName.trim().split(/\s+/);
    const perms = {};
    for (const def of PERMS) perms[def.key] = true;
    this.setState({
      modalOpen: true,
      editIndex: 'owner',
      form: { firstName: parts[0] || '', lastName: parts.slice(1).join(' '), email: this.ownerEmailVal(), phone: '' },
      perms,
      errors: {},
    });
  };

  openInvited(i) {
    const m = this.state.members[i];
    this.setState({
      modalOpen: true,
      editIndex: i,
      form: { firstName: m.firstName, lastName: m.lastName, email: m.email, phone: m.phone },
      perms: { ...m.perms },
      errors: {},
    });
  }

  closeModal = () => this.setState({ modalOpen: false });

  setField(name, value) {
    this.setState(s => ({ form: { ...s.form, [name]: value }, errors: { ...s.errors, [name]: '' } }));
  }

  togglePerm(key, checked) {
    if (key === 'fullAccess') {
      const next = {};
      for (const def of PERMS) next[def.key] = checked;
      this.setState({ perms: next });
      return;
    }
    this.setState(s => ({ perms: { ...s.perms, [key]: checked } }));
  }

  _persist(members) { try { localStorage.setItem('dxp_team', JSON.stringify(members)); } catch (e) {} }

  removeAt(i) {
    this.setState(s => { const members = s.members.filter((_, idx) => idx !== i); this._persist(members); return { members }; });
  }

  sendInvite = () => {
    const f = this.state.form;
    const errors = {};
    if (!f.firstName.trim()) errors.firstName = 'First name is required';
    if (!f.lastName.trim()) errors.lastName = 'Last name is required';
    if (!f.email.trim()) errors.email = 'Email is required';
    else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(f.email.trim())) errors.email = 'Enter a valid email';
    if (Object.keys(errors).length) { this.setState({ errors }); return; }

    const member = {
      firstName: f.firstName.trim(),
      lastName: f.lastName.trim(),
      email: f.email.trim(),
      phone: f.phone.trim(),
      fullAccess: !!this.state.perms.fullAccess,
      perms: { ...this.state.perms },
      status: 'invited', invitedAt: Date.now(),
    };
    const editIndex = this.state.editIndex;
    if (editIndex === 'owner') {
      this.setState({ modalOpen: false });
    } else if (typeof editIndex === 'number') {
      this.setState(s => { const members = s.members.map((mm, idx) => idx === editIndex ? { ...mm, ...member, status: mm.status || 'invited' } : mm); this._persist(members); return { members, modalOpen: false }; });
    } else {
      this.setState(s => { const members = [...s.members, member]; this._persist(members); return { members, modalOpen: false }; });
    }
  };

  renderVals() {
    const ownerName = this.ownerNameVal();
    const ownerEmail = this.ownerEmailVal();
    const embedded = !!this.props.embedded;

    const FULL_BG = '#EFF4FF', FULL_FG = '#3538CD';
    const RES_BG = '#ECEEF6', RES_FG = '#363F72';

    const owner = {
      name: ownerName + ' (Owner)', email: ownerEmail,
      initials: initials(ownerName.split(' ')[0], ownerName.split(' ')[1]),
      badge: 'Full Access', badgeBg: FULL_BG, badgeColor: FULL_FG,
      isOwner: true, isInvited: false, notFirst: false, onDelete: () => {}, onOpen: this.openOwner,
    };

    const invited = this.state.members.map((m, i) => {
      const full = m.fullAccess;
      return {
        name: (m.firstName + ' ' + m.lastName).trim(),
        email: m.email,
        initials: initials(m.firstName, m.lastName),
        badge: full ? 'Full Access' : 'Limited Access',
        badgeBg: full ? FULL_BG : RES_BG,
        badgeColor: full ? FULL_FG : RES_FG,
        isOwner: false, isInvited: true, notFirst: true,
        onDelete: (ev) => { ev.stopPropagation(); this.removeAt(i); },
        onOpen: () => this.openInvited(i),
      };
    });

    const members = [owner, ...invited];

    const adminOn = !!this.state.perms.fullAccess;
    const isOwnerEdit = this.state.editIndex === 'owner';
    const permsList = PERMS.map((p, i) => ({
      ...p,
      on: !!this.state.perms[p.key],
      disabled: isOwnerEdit || (adminOn && p.key !== 'fullAccess'),
      onToggle: (checked) => this.togglePerm(p.key, checked),
      border: i === PERMS.length - 1 ? 'none' : '1px solid var(--border-secondary)',
    }));

    const e = this.state.errors;
    return {
      members,
      permsList,
      embedded,
      notEmbedded: !embedded,
      rootStyle: embedded
        ? 'display:flex;flex-direction:column;background:transparent;font-family:var(--font-body);color:var(--fg-primary);'
        : 'min-height:calc(100vh / var(--dxp-zoom, 1));display:flex;flex-direction:column;background:var(--bg-secondary);font-family:var(--font-body);color:var(--fg-primary);',
      mainPad: embedded ? '0' : '72px 24px 48px',
      modalOpen: this.state.modalOpen,
      isOwnerView: isOwnerEdit,
      isInviteView: !isOwnerEdit,
      inputsDisabled: isOwnerEdit,
      modalTitle: isOwnerEdit ? 'Your access' : 'Invite a team member',
      modalDesc: isOwnerEdit
        ? "You're the account owner — you have full access to everything."
        : "They'll get an email to set up their account and join your company.",
      whoHeading: isOwnerEdit ? 'Account owner' : 'Who are you inviting?',
      openModal: this.openModal,
      closeModal: this.closeModal,
      stop: (ev) => ev.stopPropagation(),
      fFirst: this.state.form.firstName,
      fLast: this.state.form.lastName,
      fEmail: this.state.form.email,
      fPhone: this.state.form.phone,
      onFirst: (ev) => this.setField('firstName', ev.target.value),
      onLast: (ev) => this.setField('lastName', ev.target.value),
      onEmail: (ev) => this.setField('email', ev.target.value),
      onPhone: (ev) => this.setField('phone', ev.target.value),
      eFirst: e.firstName || '',
      eLast: e.lastName || '',
      eEmail: e.email || '',
      sendInvite: this.sendInvite,
    };
  }
}
</script>
</body>
</html>
